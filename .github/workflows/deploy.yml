name: Full CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install -g vercel

      # 5️⃣ Login to Vercel
      - name: Login to Vercel
        run: vercel login --token=${{ secrets.VERCEL_TOKEN }}

      # 6️⃣ Pull Vercel environment
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production

      # 7️⃣ Inject ENV variables
      - name: Generate .env.production
        run: |
          echo "NEXT_PUBLIC_COMMIT_SHA=${GITHUB_SHA}" >> .env.production
          echo "NEXT_PUBLIC_BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> .env.production

      # 8️⃣ Build project (Vercel)
      - name: Build project
        run: vercel build --prod

      # 9️⃣ Deploy to Vercel
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --yes

      # -----------------------------
      # Docker steps
      # -----------------------------
      
      # 🔟 Login Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 1️⃣1️⃣ Build Docker image
      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_COMMIT_SHA=${GITHUB_SHA} \
            -t ${{ secrets.DOCKER_USERNAME }}/docker-test:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/docker-test:${GITHUB_SHA} .

      # 1️⃣2️⃣ Push Docker images
      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-test:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-test:${GITHUB_SHA}